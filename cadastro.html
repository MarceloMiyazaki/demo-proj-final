<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro</title>
    <link rel="stylesheet" href="css/cadastro.css">
</head>
<body>
<p id="input"></p>
<p id="resposta"></p>
<div id="cadas" class="signup-card">
    <h2>Cadastro</h2>
    <input type="text" id="username" placeholder="Usuário">
    <input type="text" id="email" placeholder="E-mail">
    <input type="password" id="password" placeholder="Senha">
    <input type="password" id="password2" placeholder="Confirmar senha">
    <p onmousedown="mostrar_senha()" onmouseup="esconder_senha()" id="curto">Mostrar senha</p>
    <button onclick="fazerSignup()">Cadastrar</button>
    <div id="message"></div>
    <p onclick="trocar()">Já possui conta?</p>
</div>
<a id="login" href="login.html"></a>
<a id="menu" href="menu.html"></a>
<script src="js/persistent.js"></script>
<script src="js/cadastro.js"></script>
</body>
</html>
